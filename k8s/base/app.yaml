apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 2  # Масштабирование
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:13
        envFrom:
        - secretRef:
            name: app-secrets
        command: ['sh', '-c', 
          'until pg_isready -h db-service -U ${POSTGRES_USER}; do echo waiting for db; sleep 2; done;']
      - name: wait-for-redis
        image: redis:7-alpine
        command: ['sh', '-c', 
          'until redis-cli -h redis-service ping; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: app
        image: practice-recovery-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: app-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app: app
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP