apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
      evaluation_interval: 60s
    
    scrape_configs:
      - job_name: 'fastapi'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['app-service:8000']
      
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']