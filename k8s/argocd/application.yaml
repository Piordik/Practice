apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: counter-service
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/Piordik/Counter-service.git
    targetRevision: main
    path: k8s/overlays/dev 
    
  destination:
    server: https://kubernetes.default.svc
    namespace: default    
  
  syncPolicy:
    automated:
      prune: true              # автоматически удалять ресурсы, которых нет в Git
      selfHeal: true           # автоматически исправлять drift
    syncOptions:
      - CreateNamespace=true